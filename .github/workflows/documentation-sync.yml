name: Documentation Synchronization

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'

jobs:
  documentation-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"


    - name: Install markdownlint
      run: npm install -g markdownlint-cli

    - name: Check markdown formatting
      run: |
        find docs/ -name "*.md" -exec markdownlint {} \; 2>/dev/null || echo "No docs/ directory or markdown issues found"

    - name: Check for broken links
      run: |
        npm install -g markdown-link-check 2>/dev/null
        find docs/ -name "*.md" -exec markdown-link-check {} \; 2>/dev/null || echo "Link check skipped"

  spec-kit-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Spec-Kit
      run: |
        pip install uv 2>/dev/null
        uvx --from git+https://github.com/github/spec-kit.git specify --version 2>/dev/null || echo "Spec-Kit not available, skipping"

    - name: Validate specifications
      run: |
        specify validate specs/ 2>/dev/null || echo "No specs/ directory found, skipping"
